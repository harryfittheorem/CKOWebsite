<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Packages - CKO Franchisee Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-heading { font-family: 'Oswald', sans-serif; }
  </style>
  <script>
    tailwind.config = { theme: { extend: { colors: { accent: '#fec400' } } } }
  </script>
</head>
<body class="bg-black min-h-screen">
  <div class="p-8 text-center">
    <h1 class="font-heading text-4xl font-bold text-white mb-4">My Packages</h1>
    <p class="text-gray-400 mb-6">Manage membership packages for your location.</p>
    <a href="dashboard.html" class="inline-block px-6 py-3 bg-accent hover:bg-accent/90 text-black font-semibold rounded-lg">Back to Dashboard</a>
    <p class="text-gray-500 text-sm mt-8">Package management coming soon. Please contact admin for package setup.</p>
  </div>
  <script type="module">
    const token = sessionStorage.getItem('cko_admin_token');
    const userRole = sessionStorage.getItem('cko_user_role');
    if (!token || userRole !== 'franchisee') window.location.href = '../admin/index.html';
  </script>
</body>
</html>
