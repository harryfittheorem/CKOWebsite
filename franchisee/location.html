<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Location - CKO Franchisee Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-heading {
      font-family: 'Oswald', sans-serif;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#fec400',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black min-h-screen">

  <div class="flex h-screen">
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
      <div class="p-6 border-b border-gray-800">
        <h1 class="font-heading text-3xl font-bold text-white">CKO</h1>
        <p class="text-gray-500 text-sm mt-1">Franchisee Portal</p>
      </div>

      <nav class="flex-1 p-4 space-y-2">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          <span class="font-medium">Dashboard</span>
        </a>

        <a href="location.html" class="flex items-center gap-3 px-4 py-3 bg-gray-800 text-white rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          <span class="font-medium">My Location</span>
        </a>

        <a href="schedule.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <span class="font-medium">My Schedule</span>
        </a>

        <a href="leads.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          <span class="font-medium">My Leads</span>
        </a>

        <a href="media.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <span class="font-medium">My Media</span>
        </a>

        <a href="packages.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
          </svg>
          <span class="font-medium">My Packages</span>
        </a>

        <a href="testimonials.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
          </svg>
          <span class="font-medium">My Testimonials</span>
        </a>
      </nav>

      <div class="p-4 border-t border-gray-800">
        <button id="sign-out-btn" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-gray-300 hover:bg-red-900/20 hover:text-red-400 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span class="font-medium">Sign Out</span>
        </button>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
      <div class="p-8">
        <div class="mb-8">
          <h2 class="font-heading text-4xl font-bold text-white mb-2">My Location</h2>
          <p class="text-gray-400">Update your location information and settings.</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
          <form id="location-form" class="space-y-4">
            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">Name</label>
              <input type="text" id="input-name" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>

            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">Slug (Read Only)</label>
              <input type="text" id="input-slug" readonly class="w-full bg-gray-700 text-gray-400 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed">
            </div>

            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">Address (Read Only)</label>
              <input type="text" id="input-address" readonly class="w-full bg-gray-700 text-gray-400 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed">
            </div>

            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">City (Read Only)</label>
                <input type="text" id="input-city" readonly class="w-full bg-gray-700 text-gray-400 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed">
              </div>
              <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">State (Read Only)</label>
                <input type="text" id="input-state" readonly class="w-full bg-gray-700 text-gray-400 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed">
              </div>
              <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">ZIP (Read Only)</label>
                <input type="text" id="input-zip" readonly class="w-full bg-gray-700 text-gray-400 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed">
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Phone</label>
                <input type="text" id="input-phone" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
              </div>
              <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Email</label>
                <input type="email" id="input-email" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
              </div>
            </div>

            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">Hours</label>
              <input type="text" id="input-hours" placeholder="Mon-Fri: 5AM-9PM" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>

            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">Hero Headline (optional)</label>
              <input type="text" id="input-hero-headline" placeholder="Custom headline for your location page" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>

            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">About Text (optional)</label>
              <textarea id="input-about-text" rows="4" placeholder="Tell visitors about your location" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent"></textarea>
            </div>

            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">Google Maps Embed URL</label>
              <input type="url" id="input-google-maps-url" placeholder="https://www.google.com/maps/embed?..." class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>

            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">GHL Calendar URL</label>
              <input type="url" id="input-ghl-calendar-url" placeholder="https://..." class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Instagram URL</label>
                <input type="url" id="input-instagram-url" placeholder="https://instagram.com/..." class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
              </div>
              <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Facebook URL</label>
                <input type="url" id="input-facebook-url" placeholder="https://facebook.com/..." class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
              </div>
            </div>

            <div class="border-t border-gray-800 pt-4 mt-6">
              <h4 class="text-gray-400 text-sm font-medium mb-3">Read-Only Fields (Contact Admin to Change)</h4>

              <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                  <label class="block text-gray-500 text-xs font-medium mb-2">Latitude</label>
                  <input type="text" id="input-lat" readonly class="w-full bg-gray-700 text-gray-500 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed text-sm">
                </div>
                <div>
                  <label class="block text-gray-500 text-xs font-medium mb-2">Longitude</label>
                  <input type="text" id="input-lng" readonly class="w-full bg-gray-700 text-gray-500 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed text-sm">
                </div>
              </div>

              <div class="mb-4">
                <label class="block text-gray-500 text-xs font-medium mb-2">GHL Location ID</label>
                <input type="text" id="input-ghl-location-id" readonly class="w-full bg-gray-700 text-gray-500 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed text-sm">
              </div>

              <div class="mb-4">
                <label class="block text-gray-500 text-xs font-medium mb-2">GHL API Key</label>
                <input type="password" id="input-ghl-api-key" readonly class="w-full bg-gray-700 text-gray-500 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed text-sm" value="••••••••">
              </div>

              <div class="mb-4">
                <label class="block text-gray-500 text-xs font-medium mb-2">ClubReady Site ID</label>
                <input type="text" id="input-clubready-site-id" readonly class="w-full bg-gray-700 text-gray-500 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed text-sm">
              </div>

              <div class="mb-4">
                <label class="block text-gray-500 text-xs font-medium mb-2">ClubReady API Key</label>
                <input type="password" id="input-clubready-api-key" readonly class="w-full bg-gray-700 text-gray-500 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed text-sm" value="••••••••">
              </div>

              <div>
                <label class="block text-gray-500 text-xs font-medium mb-2">ClubReady Chain ID</label>
                <input type="text" id="input-clubready-chain-id" readonly class="w-full bg-gray-700 text-gray-500 border border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed text-sm">
              </div>
            </div>

            <div class="flex gap-4 pt-4">
              <button type="submit" id="save-btn" class="px-6 py-3 bg-accent hover:bg-accent/90 text-black font-semibold rounded-lg transition-colors">
                Save Changes
              </button>
              <div id="save-success" class="hidden flex items-center gap-2 text-green-400 text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                <span>Saved successfully!</span>
              </div>
              <div id="save-error" class="hidden flex items-center gap-2 text-red-400 text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
                <span>Error saving. Please try again.</span>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL;
    const SUPABASE_ANON_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;

    const token = sessionStorage.getItem('cko_admin_token');
    const userRole = sessionStorage.getItem('cko_user_role');
    const locationSlug = sessionStorage.getItem('cko_location_slug');

    if (!token || userRole !== 'franchisee' || !locationSlug) {
      window.location.href = '../admin/index.html';
    }

    document.getElementById('sign-out-btn').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = '../admin/index.html';
    });

    async function loadLocation() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/locations?slug=eq.${locationSlug}&select=*`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${token}`
          }
        });

        const locations = await response.json();
        if (locations.length === 0) {
          alert('Location not found');
          return;
        }

        const location = locations[0];

        document.getElementById('input-name').value = location.name || '';
        document.getElementById('input-slug').value = location.slug || '';
        document.getElementById('input-address').value = location.address || '';
        document.getElementById('input-city').value = location.city || '';
        document.getElementById('input-state').value = location.state || '';
        document.getElementById('input-zip').value = location.zip || '';
        document.getElementById('input-phone').value = location.phone || '';
        document.getElementById('input-email').value = location.email || '';
        document.getElementById('input-hours').value = location.hours || '';
        document.getElementById('input-hero-headline').value = location.hero_headline || '';
        document.getElementById('input-about-text').value = location.about_text || '';
        document.getElementById('input-google-maps-url').value = location.google_maps_embed_url || '';
        document.getElementById('input-ghl-calendar-url').value = location.ghl_calendar_url || '';
        document.getElementById('input-instagram-url').value = location.instagram_url || '';
        document.getElementById('input-facebook-url').value = location.facebook_url || '';
        document.getElementById('input-lat').value = location.lat || '';
        document.getElementById('input-lng').value = location.lng || '';
        document.getElementById('input-ghl-location-id').value = location.ghl_location_id || '';
        document.getElementById('input-clubready-site-id').value = location.clubready_site_id || '';
        document.getElementById('input-clubready-chain-id').value = location.clubready_chain_id || '';

      } catch (error) {
        console.error('Error loading location:', error);
        alert('Failed to load location data');
      }
    }

    document.getElementById('location-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const saveSuccess = document.getElementById('save-success');
      const saveError = document.getElementById('save-error');
      const saveBtn = document.getElementById('save-btn');

      saveSuccess.classList.add('hidden');
      saveError.classList.add('hidden');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/locations?slug=eq.${locationSlug}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            name: document.getElementById('input-name').value.trim(),
            phone: document.getElementById('input-phone').value.trim(),
            email: document.getElementById('input-email').value.trim(),
            hours: document.getElementById('input-hours').value.trim(),
            hero_headline: document.getElementById('input-hero-headline').value.trim(),
            about_text: document.getElementById('input-about-text').value.trim(),
            google_maps_embed_url: document.getElementById('input-google-maps-url').value.trim(),
            ghl_calendar_url: document.getElementById('input-ghl-calendar-url').value.trim(),
            instagram_url: document.getElementById('input-instagram-url').value.trim() || null,
            facebook_url: document.getElementById('input-facebook-url').value.trim() || null,
          })
        });

        if (!response.ok) {
          throw new Error('Failed to save');
        }

        saveSuccess.classList.remove('hidden');
        setTimeout(() => saveSuccess.classList.add('hidden'), 3000);

      } catch (error) {
        console.error('Error saving location:', error);
        saveError.classList.remove('hidden');
        setTimeout(() => saveError.classList.add('hidden'), 5000);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
      }
    });

    loadLocation();
  </script>

</body>
</html>
