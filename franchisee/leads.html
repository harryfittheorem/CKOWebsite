<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Leads - CKO Franchisee Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-heading { font-family: 'Oswald', sans-serif; }
  </style>
  <script>
    tailwind.config = { theme: { extend: { colors: { accent: '#fec400' } } } }
  </script>
</head>
<body class="bg-black min-h-screen">
  <div class="flex h-screen">
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
      <div class="p-6 border-b border-gray-800">
        <h1 class="font-heading text-3xl font-bold text-white">CKO</h1>
        <p class="text-gray-500 text-sm mt-1">Franchisee Portal</p>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="font-medium">Dashboard</span></a>
        <a href="location.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><span class="font-medium">My Location</span></a>
        <a href="schedule.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span class="font-medium">My Schedule</span></a>
        <a href="leads.html" class="flex items-center gap-3 px-4 py-3 bg-gray-800 text-white rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg><span class="font-medium">My Leads</span></a>
        <a href="media.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span class="font-medium">My Media</span></a>
        <a href="packages.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg><span class="font-medium">My Packages</span></a>
        <a href="testimonials.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg><span class="font-medium">My Testimonials</span></a>
      </nav>
      <div class="p-4 border-t border-gray-800">
        <button id="sign-out-btn" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-gray-300 hover:bg-red-900/20 hover:text-red-400 rounded-lg transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg><span class="font-medium">Sign Out</span></button>
      </div>
    </aside>
    <main class="flex-1 overflow-y-auto">
      <div class="p-8">
        <div class="flex justify-between items-center mb-8">
          <div>
            <h2 class="font-heading text-4xl font-bold text-white mb-2">My Leads</h2>
            <p class="text-gray-400">View and manage leads for your location.</p>
          </div>
          <button id="export-csv-btn" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-lg flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>Export CSV</button>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
          <div class="p-4 border-b border-gray-800">
            <div class="grid grid-cols-2 gap-4">
              <input type="date" id="start-date" class="bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
              <input type="date" id="end-date" class="bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-800 text-gray-300 text-sm">
                <tr><th class="px-6 py-3 text-left">Date</th><th class="px-6 py-3 text-left">Name</th><th class="px-6 py-3 text-left">Phone</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-left">Source</th><th class="px-6 py-3 text-left">GHL Status</th></tr>
              </thead>
              <tbody id="leads-table-body" class="text-white text-sm"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module">
    const SUPABASE_URL = import.meta.env.VITE_SUPABASE_URL;
    const SUPABASE_ANON_KEY = import.meta.env.VITE_SUPABASE_ANON_KEY;
    const token = sessionStorage.getItem('cko_admin_token');
    const userRole = sessionStorage.getItem('cko_user_role');
    const locationSlug = sessionStorage.getItem('cko_location_slug');
    if (!token || userRole !== 'franchisee' || !locationSlug) window.location.href = '../admin/index.html';
    document.getElementById('sign-out-btn').addEventListener('click', () => { sessionStorage.clear(); window.location.href = '../admin/index.html'; });
    let allLeads = [];
    async function loadLeads() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/leads?location_slug=eq.${locationSlug}&order=created_at.desc&select=*`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` } });
      allLeads = await res.json();
      renderLeads();
    }
    function renderLeads() {
      const tbody = document.getElementById('leads-table-body');
      const startDate = document.getElementById('start-date').value;
      const endDate = document.getElementById('end-date').value;
      let filtered = allLeads;
      if (startDate) filtered = filtered.filter(l => l.created_at >= startDate);
      if (endDate) filtered = filtered.filter(l => l.created_at <= endDate + 'T23:59:59');
      tbody.innerHTML = filtered.map(l => `<tr class="border-b border-gray-800"><td class="px-6 py-4">${new Date(l.created_at).toLocaleDateString()}</td><td class="px-6 py-4">${l.name}</td><td class="px-6 py-4">${l.phone}</td><td class="px-6 py-4">${l.email}</td><td class="px-6 py-4">${l.source || '-'}</td><td class="px-6 py-4"><span class="px-2 py-1 rounded text-xs ${l.ghl_push_status === 'success' ? 'bg-green-900/30 text-green-400' : 'bg-gray-800 text-gray-400'}">${l.ghl_push_status || 'pending'}</span></td></tr>`).join('');
    }
    document.getElementById('start-date').addEventListener('change', renderLeads);
    document.getElementById('end-date').addEventListener('change', renderLeads);
    document.getElementById('export-csv-btn').addEventListener('click', () => {
      const csv = ['Date,Name,Phone,Email,Source,GHL Status', ...allLeads.map(l => `${new Date(l.created_at).toLocaleDateString()},${l.name},${l.phone},${l.email},${l.source || ''},${l.ghl_push_status || 'pending'}`)].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `leads-${locationSlug}-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    });
    loadLeads();
  </script>
</body>
</html>
