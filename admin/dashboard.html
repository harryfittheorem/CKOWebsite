<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CKO Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-heading {
      font-family: 'Oswald', sans-serif;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#fec400',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black min-h-screen">

  <div class="flex h-screen">
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
      <div class="p-6 border-b border-gray-800">
        <h1 class="font-heading text-3xl font-bold text-white">CKO</h1>
        <p class="text-gray-500 text-sm mt-1">Admin Portal</p>
      </div>

      <nav class="flex-1 p-4 space-y-2">
        <a href="locations.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          <span class="font-medium">Locations</span>
        </a>

        <a href="leads.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          <span class="font-medium">Leads</span>
        </a>

        <a href="schedule.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <span class="font-medium">Schedule</span>
        </a>
      </nav>

      <div class="p-4 border-t border-gray-800">
        <button id="sign-out-btn" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-gray-300 hover:bg-red-900/20 hover:text-red-400 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span class="font-medium">Sign Out</span>
        </button>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
      <div class="p-8">
        <div class="mb-8">
          <h2 class="font-heading text-4xl font-bold text-white mb-2">Welcome to CKO Admin</h2>
          <p class="text-gray-400">Manage your locations, leads, and schedule from one place.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
            <div class="flex items-center justify-between mb-4">
              <div class="p-3 bg-accent/10 rounded-lg">
                <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
              </div>
            </div>
            <h3 class="text-gray-400 text-sm font-medium mb-1">Total Locations</h3>
            <p id="total-locations" class="text-3xl font-bold text-white">
              <span class="inline-block animate-pulse">-</span>
            </p>
          </div>

          <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
            <div class="flex items-center justify-between mb-4">
              <div class="p-3 bg-blue-500/10 rounded-lg">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
              </div>
            </div>
            <h3 class="text-gray-400 text-sm font-medium mb-1">Total Leads</h3>
            <p id="total-leads" class="text-3xl font-bold text-white">
              <span class="inline-block animate-pulse">-</span>
            </p>
          </div>

          <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
            <div class="flex items-center justify-between mb-4">
              <div class="p-3 bg-green-500/10 rounded-lg">
                <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
              </div>
            </div>
            <h3 class="text-gray-400 text-sm font-medium mb-1">Leads This Week</h3>
            <p id="leads-this-week" class="text-3xl font-bold text-white">
              <span class="inline-block animate-pulse">-</span>
            </p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://agbmljovmexflolbgljn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFnYm1sam92bWV4ZmxvbGJnbGpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3OTg3ODAsImV4cCI6MjA4MzM3NDc4MH0.dBQxzYtka4nD0eJQFH0Izj-jbQBX4kEoMS0vZrSOtRA';

    const token = sessionStorage.getItem('cko_admin_token');
    if (!token) {
      window.location.href = 'index.html';
    }

    const signOutBtn = document.getElementById('sign-out-btn');
    signOutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('cko_admin_token');
      sessionStorage.removeItem('cko_admin_refresh');
      window.location.href = 'index.html';
    });

    async function fetchStats() {
      try {
        const headers = {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        };

        const locationsResponse = await fetch(`${SUPABASE_URL}/rest/v1/locations?select=count`, {
          headers: {
            ...headers,
            'Prefer': 'count=exact'
          }
        });

        if (locationsResponse.ok) {
          const locationCount = locationsResponse.headers.get('content-range');
          if (locationCount) {
            const count = locationCount.split('/')[1];
            document.getElementById('total-locations').textContent = count;
          }
        }

        const leadsResponse = await fetch(`${SUPABASE_URL}/rest/v1/leads?select=count`, {
          headers: {
            ...headers,
            'Prefer': 'count=exact'
          }
        });

        if (leadsResponse.ok) {
          const leadCount = leadsResponse.headers.get('content-range');
          if (leadCount) {
            const count = leadCount.split('/')[1];
            document.getElementById('total-leads').textContent = count;
          }
        }

        const oneWeekAgo = new Date();
        oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
        const isoDate = oneWeekAgo.toISOString();

        const weekLeadsResponse = await fetch(`${SUPABASE_URL}/rest/v1/leads?select=count&created_at=gte.${isoDate}`, {
          headers: {
            ...headers,
            'Prefer': 'count=exact'
          }
        });

        if (weekLeadsResponse.ok) {
          const weekCount = weekLeadsResponse.headers.get('content-range');
          if (weekCount) {
            const count = weekCount.split('/')[1];
            document.getElementById('leads-this-week').textContent = count;
          }
        }

      } catch (error) {
        console.error('Error fetching stats:', error);
        document.getElementById('total-locations').textContent = 'Error';
        document.getElementById('total-leads').textContent = 'Error';
        document.getElementById('leads-this-week').textContent = 'Error';
      }
    }

    fetchStats();
  </script>

</body>
</html>
