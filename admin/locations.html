<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locations - CKO Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-heading {
      font-family: 'Oswald', sans-serif;
    }
    .slide-panel {
      transform: translateX(100%);
      transition: transform 0.3s ease-in-out;
    }
    .slide-panel.open {
      transform: translateX(0);
    }
    .overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-in-out;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#fec400',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black min-h-screen">

  <div class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
      <div class="p-6 border-b border-gray-800">
        <h1 class="font-heading text-3xl font-bold text-white">CKO</h1>
        <p class="text-gray-500 text-sm mt-1">Admin Portal</p>
      </div>

      <nav class="flex-1 p-4 space-y-2">
        <a href="locations.html" class="flex items-center gap-3 px-4 py-3 text-white bg-gray-800 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          <span class="font-medium">Locations</span>
        </a>

        <a href="leads.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          <span class="font-medium">Leads</span>
        </a>

        <a href="schedule.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <span class="font-medium">Schedule</span>
        </a>
      </nav>

      <div class="p-4 border-t border-gray-800">
        <button id="sign-out-btn" class="w-full flex items-center justify-center gap-2 px-4 py-3 text-gray-300 hover:bg-red-900/20 hover:text-red-400 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span class="font-medium">Sign Out</span>
        </button>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
      <div class="p-8">
        <div class="flex justify-between items-center mb-8">
          <div>
            <h2 class="font-heading text-4xl font-bold text-white mb-2">Locations</h2>
            <p class="text-gray-400">Manage CKO gym locations and schedules</p>
          </div>
          <button id="add-location-btn" class="bg-accent hover:bg-[#e5b000] text-black font-semibold px-6 py-3 rounded-lg transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add New Location
          </button>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-800/50 border-b border-gray-800">
              <tr>
                <th class="text-left px-6 py-4 text-gray-300 text-sm font-semibold">Name</th>
                <th class="text-left px-6 py-4 text-gray-300 text-sm font-semibold">City, State</th>
                <th class="text-left px-6 py-4 text-gray-300 text-sm font-semibold">Phone</th>
                <th class="text-left px-6 py-4 text-gray-300 text-sm font-semibold">Status</th>
                <th class="text-right px-6 py-4 text-gray-300 text-sm font-semibold">Actions</th>
              </tr>
            </thead>
            <tbody id="locations-table-body" class="divide-y divide-gray-800">
              <tr>
                <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                  <svg class="animate-spin h-8 w-8 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  Loading locations...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="overlay" class="overlay fixed inset-0 bg-black/60 z-40"></div>

  <div id="edit-panel" class="slide-panel fixed right-0 top-0 h-full w-[480px] bg-gray-900 border-l border-gray-800 z-50 overflow-y-auto">
    <div class="sticky top-0 bg-gray-900 border-b border-gray-800 p-6 flex justify-between items-center z-10">
      <h3 id="panel-title" class="font-heading text-2xl font-bold text-white">Edit Location</h3>
      <button id="close-panel-btn" class="text-gray-400 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="flex border-b border-gray-800">
      <button id="details-tab-btn" class="flex-1 px-6 py-4 text-white font-medium bg-gray-800 border-b-2 border-accent">
        Details
      </button>
      <button id="schedule-tab-btn" class="flex-1 px-6 py-4 text-gray-400 font-medium hover:text-white transition-colors">
        Schedule
      </button>
    </div>

    <div id="details-tab" class="p-6 space-y-4">
      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Name</label>
        <input type="text" id="input-name" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Slug</label>
        <input type="text" id="input-slug" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Address</label>
        <input type="text" id="input-address" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">City</label>
          <input type="text" id="input-city" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
        </div>
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">State</label>
          <input type="text" id="input-state" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
        </div>
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">ZIP</label>
        <input type="text" id="input-zip" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Phone</label>
          <input type="text" id="input-phone" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
        </div>
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Email</label>
          <input type="email" id="input-email" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
        </div>
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Hours</label>
        <input type="text" id="input-hours" placeholder="Mon-Fri: 5AM-9PM" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Hero Headline (optional)</label>
        <input type="text" id="input-hero-headline" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">About Text</label>
        <textarea id="input-about-text" rows="4" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent"></textarea>
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">Google Maps Embed URL</label>
        <input type="text" id="input-google-maps-url" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">GHL Calendar URL</label>
        <input type="text" id="input-ghl-calendar-url" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">GHL Location ID</label>
        <input type="text" id="input-ghl-location-id" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div>
        <label class="block text-gray-300 text-sm font-medium mb-2">ClubReady Site ID</label>
        <input type="text" id="input-clubready-site-id" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Latitude</label>
          <input type="number" step="0.0000001" id="input-lat" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
        </div>
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Longitude</label>
          <input type="number" step="0.0000001" id="input-lng" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
        </div>
      </div>

      <div class="flex items-center justify-between p-4 bg-gray-800 rounded-lg">
        <div>
          <label class="text-white font-medium">Is Active</label>
          <p class="text-gray-400 text-sm">Location accepts new members</p>
        </div>
        <button id="toggle-active" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none bg-gray-700">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
        </button>
      </div>

      <button id="save-location-btn" class="w-full bg-accent hover:bg-[#e5b000] text-black font-semibold py-3 rounded-lg transition-all">
        Save Changes
      </button>
    </div>

    <div id="schedule-tab" class="p-6 space-y-4 hidden">
      <div class="space-y-2" id="schedule-list">
        <div class="text-center text-gray-500 py-8">
          <svg class="animate-spin h-8 w-8 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Loading schedule...
        </div>
      </div>

      <div class="border-t border-gray-800 pt-4 mt-6">
        <h4 class="text-white font-semibold mb-4">Add Class</h4>
        <form id="add-class-form" class="space-y-3">
          <div>
            <label class="block text-gray-300 text-sm font-medium mb-2">Day of Week</label>
            <select id="class-day" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
              <option value="monday">Monday</option>
              <option value="tuesday">Tuesday</option>
              <option value="wednesday">Wednesday</option>
              <option value="thursday">Thursday</option>
              <option value="friday">Friday</option>
              <option value="saturday">Saturday</option>
              <option value="sunday">Sunday</option>
            </select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">Start Time</label>
              <input type="time" id="class-start-time" required class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>
            <div>
              <label class="block text-gray-300 text-sm font-medium mb-2">End Time</label>
              <input type="time" id="class-end-time" required class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
            </div>
          </div>

          <div>
            <label class="block text-gray-300 text-sm font-medium mb-2">Class Type</label>
            <input type="text" id="class-type" required placeholder="Kickboxing" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
          </div>

          <div>
            <label class="block text-gray-300 text-sm font-medium mb-2">Instructor (optional)</label>
            <input type="text" id="class-instructor" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
          </div>

          <div>
            <label class="block text-gray-300 text-sm font-medium mb-2">GHL Booking URL (optional)</label>
            <input type="url" id="class-booking-url" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-accent">
          </div>

          <button type="submit" class="w-full bg-accent hover:bg-[#e5b000] text-black font-semibold py-3 rounded-lg transition-all">
            Add Class
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
    </svg>
    <span id="toast-message">Success!</span>
  </div>

  <script src="/admin/locations.js"></script>

</body>
</html>
