<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Test Franchisee</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Creating Test Franchisee User...</h1>
  <div id="result"></div>

  <script type="module">
    const supabaseUrl = import.meta.env.VITE_SUPABASE_URL;
    const supabaseKey = import.meta.env.VITE_SUPABASE_ANON_KEY;
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function createTestUser() {
      const resultDiv = document.getElementById('result');

      try {
        // Create user via Supabase Auth
        const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
          email: 'franchisee@test.com',
          password: 'Test123!',
          options: {
            data: {
              role: 'franchisee'
            }
          }
        });

        if (signUpError) {
          resultDiv.innerHTML = `<p style="color: red;">Error creating user: ${signUpError.message}</p>`;
          return;
        }

        console.log('User created:', signUpData);

        // Insert into user_profiles
        const userId = signUpData.user.id;

        const { error: profileError } = await supabase
          .from('user_profiles')
          .insert({
            id: userId,
            role: 'franchisee',
            location_slug: 'tx-league-city'
          });

        if (profileError) {
          resultDiv.innerHTML = `<p style="color: red;">Error creating profile: ${profileError.message}</p>`;
          return;
        }

        // Insert into user_locations
        const { error: locationError } = await supabase
          .from('user_locations')
          .insert({
            user_id: userId,
            location_slug: 'tx-league-city'
          });

        if (locationError) {
          resultDiv.innerHTML = `<p style="color: red;">Error linking location: ${locationError.message}</p>`;
          return;
        }

        resultDiv.innerHTML = `
          <div style="color: green;">
            <h2>Success! Test franchisee user created:</h2>
            <p><strong>Email:</strong> franchisee@test.com</p>
            <p><strong>Password:</strong> Test123!</p>
            <p><strong>Location:</strong> CKO League City (tx-league-city)</p>
            <br>
            <p>You can now login at <a href="/franchisee/dashboard.html">/franchisee/dashboard.html</a></p>
          </div>
        `;

      } catch (error) {
        resultDiv.innerHTML = `<p style="color: red;">Unexpected error: ${error.message}</p>`;
      }
    }

    createTestUser();
  </script>
</body>
</html>
